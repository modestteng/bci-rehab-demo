name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN 需要这些权限才能发布 Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署，新的推送取消排队中的旧任务
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # enablement: true 会自动为仓库打开 Pages，省掉手动去 Settings 里点一次
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - run: npm ci

      - run: npm run build

      # vite.config.ts 里 base 是 './'，产物可直接放在 /bci-rehab-demo/ 子路径下
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
